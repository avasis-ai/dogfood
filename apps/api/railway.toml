# Railway config for the Dogfood FastAPI backend.
#
# Deploy from repo root with root dir set to apps/api.
# Railway will detect pyproject.toml and install with uv.

[build]
builder = "nixpacks"
buildCommand = "uv sync --frozen"

[deploy]
startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "dogfood-api"
