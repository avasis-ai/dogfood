<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Dogfood">
  <title>Dogfood</title>

  <!-- Canvas -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Subtle grid dots (brutalist terminal texture) -->
  <g fill="#1f1f1f">
    <rect x="63" y="63" width="2" height="2"/>
    <rect x="127" y="63" width="2" height="2"/>
    <rect x="191" y="63" width="2" height="2"/>
    <rect x="255" y="63" width="2" height="2"/>
    <rect x="319" y="63" width="2" height="2"/>
    <rect x="383" y="63" width="2" height="2"/>
    <rect x="447" y="63" width="2" height="2"/>
    <rect x="63" y="447" width="2" height="2"/>
    <rect x="127" y="447" width="2" height="2"/>
    <rect x="191" y="447" width="2" height="2"/>
    <rect x="255" y="447" width="2" height="2"/>
    <rect x="319" y="447" width="2" height="2"/>
    <rect x="383" y="447" width="2" height="2"/>
    <rect x="447" y="447" width="2" height="2"/>
  </g>

  <!-- Inner frame (barely-there border, terminal window feel) -->
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="#1f1f1f" stroke-width="1"/>

  <!--
    Bowl glyph:
    - Trapezoid bowl body with flat bottom
    - A square "bite" notched out of the top-left rim
    - One orange kibble square sits inside
    - The shape also reads as a terminal prompt bracket
    Geometry is locked to an 8px grid for crisp rendering at favicon size.
  -->

  <!-- Bowl body: outlined trapezoid (stroke-only for brutalist line-weight feel) -->
  <path
    d="M 128 208 L 384 208 L 352 368 L 160 368 Z"
    fill="none"
    stroke="#ffffff"
    stroke-width="16"
    stroke-linejoin="miter"
    stroke-miterlimit="2"/>

  <!-- Rim line (top edge of the bowl, thicker   anchors the eye) -->
  <rect x="120" y="200" width="272" height="16" fill="#ffffff"/>

  <!-- Bite mark: subtractive square notch cut from the rim.
       Drawn as a black square that overlaps the rim, giving the "something's been eaten" feel. -->
  <rect x="232" y="184" width="48" height="48" fill="#0a0a0a"/>
  <rect x="240" y="192" width="32" height="32" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Kibble: the accent. A single orange square inside the bowl   the food. -->
  <rect x="240" y="272" width="32" height="32" fill="#ff5c1f"/>

  <!-- Secondary kibble pieces (smaller, muted) for composition -->
  <rect x="192" y="304" width="16" height="16" fill="#ffffff"/>
  <rect x="304" y="304" width="16" height="16" fill="#ffffff"/>

  <!-- Base shadow line under the bowl (grounds it) -->
  <rect x="144" y="384" width="224" height="4" fill="#1f1f1f"/>

  <!-- Corner ticks (terminal-window chrome) -->
  <g fill="#ff5c1f">
    <rect x="40" y="40" width="12" height="2"/>
    <rect x="40" y="40" width="2" height="12"/>
    <rect x="460" y="40" width="12" height="2"/>
    <rect x="470" y="40" width="2" height="12"/>
    <rect x="40" y="470" width="12" height="2"/>
    <rect x="40" y="460" width="2" height="12"/>
    <rect x="460" y="470" width="12" height="2"/>
    <rect x="470" y="460" width="2" height="12"/>
  </g>
</svg>
